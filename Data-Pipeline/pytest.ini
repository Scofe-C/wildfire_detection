# =============================================================================
# pytest configuration — place at Data-Pipeline/pytest.ini
# =============================================================================
# Run from Data-Pipeline/ directory:
#   pytest                          # all tests
#   pytest -m "not gcp"            # skip anything that needs real GCP creds
#   pytest -m "not slow"           # skip slow / property-based tests
#   pytest tests/test_dvc/ -v      # DVC tests only
# =============================================================================

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

markers =
    slow: marks tests as slow — deselect with -m "not slow"
    gcp: marks tests that require real GCP credentials (GOOGLE_APPLICATION_CREDENTIALS)
    integration: marks multi-module integration tests
    dag: marks DAG structure / wiring tests (no task execution)
    property: marks property-based tests (requires: pip install hypothesis)
    dvc: marks DVC-specific tests

filterwarnings =
    ignore::DeprecationWarning:airflow
    ignore::PendingDeprecationWarning
    ignore::UserWarning:dvc