[pytest]
testpaths = tests

addopts =
    --tb=short
    --no-header
    -q
    --import-mode=importlib

markers =
    gcp: marks tests that require real GCP credentials (deselect with -m "not gcp")
    slow: marks tests that take >5 seconds (deselect with -m "not slow")
    integration: marks end-to-end integration tests requiring all services

filterwarnings =
    # Airflow internals
    ignore::DeprecationWarning:airflow
    ignore::PendingDeprecationWarning:airflow
    # great_expectations / marshmallow version mismatch warning.
    # marshmallow is a GE dependency that warns about its own Number field.
    # Filter by message since the module is not directly importable.
    ignore:.*`Number` field should not be instantiated.*
    ignore:.*Number.*field should not be instantiated.*
    # Other known library noise
    ignore::UserWarning:google.auth
    ignore::DeprecationWarning:pkg_resources

norecursedirs =
    .git
    .dvc
    .venv
    venv
    env
    __pycache__
    *.egg-info
    dist
    build
    node_modules
    logs
    data
    models
    .hypothesis

minversion = 7.0