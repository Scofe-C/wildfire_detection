version: '3.8'

# =============================================================================
# Wildfire MLOps - Local Development Docker Compose
# =============================================================================
# This runs Airflow locally with all pipeline dependencies.
# Usage:
#   docker compose up -d
#   docker compose logs -f airflow-webserver
#   Open http://localhost:8080 (user: airflow, pass: airflow)
#
# Owner: Person E
# =============================================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__ENABLE_XCOM_PICKLING: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # Pipeline-specific environment variables
    FIRMS_MAP_KEY: ${FIRMS_MAP_KEY:-your_firms_api_key_here}
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-my-wildfire-1}
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp-key.json
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./configs:/opt/airflow/configs
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./tests:/opt/airflow/tests
    # DVC config and pipeline definition (needed by version_with_dvc task)
    - ./.dvc:/opt/airflow/.dvc:ro
    - ./dvc.yaml:/opt/airflow/dvc.yaml:ro
    # Mount GCP service account key (create this file locally)
    - ${GCP_KEY_PATH:-./gcp-key.json}:/opt/airflow/gcp-key.json:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    ports:
      - "5432:5432"

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username airflow \
          --firstname Wildfire \
          --lastname Team \
          --role Admin \
          --email team@wildfire-mlops.dev \
          --password airflow
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data: