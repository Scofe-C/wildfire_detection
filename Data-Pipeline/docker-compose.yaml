# Wildfire MLOps - Local Development Docker Compose
# =================================================
# Usage: docker compose up -d --build
#        Open: http://localhost:8080 (user: airflow, pass: airflow)
#
# Cross-platform notes:
#   - Windows 11/10 (WSL2 Docker Desktop): use CRLF-safe .env (see .env.example)
#   - macOS: use environment.yml for native conda dev; Docker for Airflow UI
#   - All: GCP key is mounted read-only; never commit gcp-key.json
#
# Improvements applied:
#   4a. Budget alerts are GCP Console only (no code change needed here)
#   DVC volumes restored: .dvc/ and dvc.yaml are mounted so version_with_dvc
#       BashOperator can call dvc add / dvc push from inside the container.

version: '3.8'

x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor

  # Both keys for Airflow 2.x compat (moved from [core] to [database] in 2.3+)
  AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

  AIRFLOW__CORE__FERNET_KEY: ""
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__ENABLE_XCOM_PICKLING: "true"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

  FIRMS_MAP_KEY: ${FIRMS_MAP_KEY:-your_firms_api_key_here}
  GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-wildfire-mlops-dev}
  SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp-key.json

x-airflow-common-volumes: &airflow-common-volumes
  - ./dags:/opt/airflow/dags
  - ./scripts:/opt/airflow/scripts
  - ./configs:/opt/airflow/configs
  - ./data:/opt/airflow/data
  - ./logs:/opt/airflow/logs
  - ./tests:/opt/airflow/tests
  # GCP service account key (create locally — never commit)
  - ${GCP_KEY_PATH:-./gcp-key.json}:/opt/airflow/gcp-key.json:ro
  # DVC config and pipeline definition (needed by version_with_dvc task)
  # Mounted read-only: container reads config, dvc add/push write to data/
  - ./.dvc:/opt/airflow/.dvc

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: airflow-init
    image: wildfire-airflow-init:local
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e

        airflow db migrate

        airflow users create \
          --username airflow \
          --firstname Wildfire \
          --lastname MLOps \
          --role Admin \
          --email airflow@example.com \
          --password airflow \
        || true

        echo "Airflow init complete."

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: airflow-webserver
    image: wildfire-airflow-webserver:local
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: ["airflow", "webserver", "--port", "8080"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: airflow-scheduler
    image: wildfire-airflow-scheduler:local
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: ["airflow", "scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  postgres-data:
