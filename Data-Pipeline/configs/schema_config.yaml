# =============================================================================
# Wildfire MLOps - Dynamic Feature Registry
# =============================================================================
# SINGLE SOURCE OF TRUTH for the unified schema.
# To disable a feature: set enabled: false (do NOT delete — preserve audit trail).
#
# Improvements applied (pipeline_improvements_guide.md):
#   1a. H3 Resolution 5 added as new default standard (~22 km², 5.1 km edge)
#   2b. data_quality_flag expanded to codes 0-5 with HRRR and forward-fill codes
#   3a. regional_priority metadata added to all features
#   4c. parquet_partition_columns updated for region/year/month structure
# =============================================================================

pipeline:
  name: "wildfire_data_pipeline"
  version: "1.1.0"
  # --- Improvement 1a ---
  # Default changed from 64 km (H3 res 2, ~200 cells CA+TX) to 22 km (H3 res 5,
  # ~800-1000 cells CA alone). Keep 64 in the map for backward cache compat.
  default_resolution_km: 22
  supported_resolutions_km: [64, 22, 10, 1]
  h3_resolution_map:
    64: 2     # Legacy — backward compat with existing static cache files
    22: 5     # NEW default: ~22 km² area, 5.1 km edge
    10: 4
    1: 7
  temporal_aggregation_hours: 6
  time_windows_utc: ["00:00", "06:00", "12:00", "18:00"]
  geographic_scope:
    california:
      bbox: [-124.48, 32.53, -114.13, 42.01]
      fips_codes: ["06"]
      # Improvement 1c: spatial pruning guard.
      # Set false for CA if desert zones (Mojave/Owens Valley) drop unexpectedly.
      # FBFM99 (barren) in those areas sits adjacent to real WUI cells — the
      # neighbor-check in prune_non_vegetated_cells should catch it, but this
      # flag lets you disable pruning per-region with zero code change.
      spatial_pruning_enabled: true
    texas:
      bbox: [-106.65, 25.84, -93.51, 36.50]
      fips_codes: ["48"]
      spatial_pruning_enabled: true

data_sources:
  firms:
    base_url: "https://firms.modaps.eosdis.nasa.gov/api/area"
    sensors: ["VIIRS_SNPP_NRT", "VIIRS_NOAA20_NRT", "MODIS_NRT"]
    api_key_env_var: "FIRMS_MAP_KEY"
    rate_limit:
      max_requests_per_10min: 5000
      backoff_base_seconds: 5
      backoff_max_seconds: 300
      jitter: true
    output_format: "csv"
    timeout_seconds: 30
    max_retries: 3

  open_meteo:
    base_url: "https://api.open-meteo.com/v1/forecast"
    historical_url: "https://archive-api.open-meteo.com/v1/archive"
    rate_limit:
      max_requests_per_day: 10000
      backoff_base_seconds: 2
      backoff_max_seconds: 120
    timeout_seconds: 20
    max_retries: 3
    coordinate_precision: 3

  nws:
    base_url: "https://api.weather.gov"
    user_agent: "WildfireMLOps/1.0 (university-project)"
    timeout_seconds: 15
    max_retries: 2
    role: "fallback"

  hrrr:
    # NOAA High-Resolution Rapid Refresh. Deferred to streaming phase.
    # Placeholder config — sets data_quality_flag=3 when used.
    base_url: "https://nomads.ncep.noaa.gov/pub/data/nccf/com/hrrr/prod/"
    update_frequency_minutes: 15
    role: "rapid_fallback"

  landfire:
    products:
      fbfm40:
        description: "40 Scott & Burgan Fire Behavior Fuel Models"
        download_url: "https://landfire.gov/bulk/downloadfile.php?ESSION_ID=&TYPE=landfire&FNAME=LF2022_FBFM40_230_CONUS.zip"
      canopy_cover:
        description: "Forest Canopy Cover percentage"
        download_url: "https://landfire.gov/bulk/downloadfile.php?FNAME=LF2022_CC_230_CONUS.zip"
      vegetation_type:
        description: "Existing Vegetation Type"
        download_url: "https://landfire.gov/bulk/downloadfile.php?FNAME=LF2022_EVT_230_CONUS.zip"
    native_crs: "EPSG:5070"
    native_resolution_m: 30

  srtm:
    source: "USGS SRTM 30m"
    ee_asset: "USGS/SRTMGL1_003"
    native_crs: "EPSG:4326"
    native_resolution_m: 30

  nifc:
    perimeters_url: "https://data-nifc.opendata.arcgis.com/datasets/nifc::interagencyfireperimeterhistory-all-years-view/about"
    cal_fire_url: "https://data.ca.gov/dataset/california-fire-perimeters-all"

features:
  identifiers:
    - name: "grid_id"
      type: "string"
      description: "H3 hexagonal index at the configured resolution"
      source: "computed"
      enabled: true
      nullable: false

    - name: "region"
      type: "string"
      description: "Geographic region name (california, texas)"
      source: "computed"
      enabled: true
      nullable: false

    - name: "latitude"
      type: "float64"
      description: "H3 cell centroid latitude (WGS84)"
      source: "computed"
      enabled: true
      nullable: false
      validation:
        min: 25.0
        max: 43.0

    - name: "longitude"
      type: "float64"
      description: "H3 cell centroid longitude (WGS84)"
      source: "computed"
      enabled: true
      nullable: false
      validation:
        min: -125.0
        max: -93.0

    - name: "timestamp"
      type: "datetime64[ns]"
      description: "Canonical timestamp for the 6-hour aggregation window"
      source: "computed"
      enabled: true
      nullable: false

    - name: "resolution_km"
      type: "int32"
      description: "Grid resolution in kilometers"
      source: "computed"
      enabled: true
      nullable: false
      validation:
        allowed_values: [1, 10, 22, 64]

  weather:
    - name: "temperature_2m"
      type: "float32"
      description: "Air temperature at 2m above ground (°C)"
      source: "open_meteo"
      open_meteo_param: "temperature_2m"
      enabled: true
      nullable: true
      validation:
        min: -50.0
        max: 65.0
      fill_strategy: "forward_fill"
      regional_priority:
        california: "standard"
        texas: "standard"

    - name: "relative_humidity_2m"
      type: "float32"
      description: "Relative humidity at 2m (%)"
      source: "open_meteo"
      open_meteo_param: "relative_humidity_2m"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 100.0
      fill_strategy: "forward_fill"
      regional_priority:
        california: "critical"   # Offshore flow / Diablo winds key driver
        texas: "standard"

    - name: "wind_speed_10m"
      type: "float32"
      description: "Wind speed at 10m above ground (km/h)"
      source: "open_meteo"
      open_meteo_param: "wind_speed_10m"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 250.0
      fill_strategy: "forward_fill"
      regional_priority:
        california: "critical"   # Santa Ana / Diablo wind events
        texas: "critical"        # Red flag wind events across plains

    - name: "wind_direction_10m"
      type: "float32"
      description: "Wind direction at 10m (degrees, 0=N, 90=E)"
      source: "open_meteo"
      open_meteo_param: "wind_direction_10m"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 360.0
      fill_strategy: "forward_fill"
      regional_priority:
        california: "critical"
        texas: "standard"

    - name: "precipitation"
      type: "float32"
      description: "Total precipitation in aggregation window (mm)"
      source: "open_meteo"
      open_meteo_param: "precipitation"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 500.0
      fill_strategy: "zero"
      regional_priority:
        california: "standard"
        texas: "critical"   # TX drought-driven fires; precipitation gap is key

    - name: "soil_moisture_0_to_7cm"
      type: "float32"
      description: "Volumetric soil moisture 0-7cm depth (m³/m³)"
      source: "open_meteo"
      open_meteo_param: "soil_moisture_0_to_7cm"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 1.0
      fill_strategy: "forward_fill"
      regional_priority:
        california: "standard"
        texas: "critical"

    - name: "vpd"
      type: "float32"
      description: "Vapor Pressure Deficit (kPa)"
      source: "open_meteo"
      open_meteo_param: "vapor_pressure_deficit"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 15.0
      fill_strategy: "forward_fill"
      regional_priority:
        california: "critical"
        texas: "standard"

    - name: "fire_weather_index"
      type: "float32"
      description: "Canadian Fire Weather Index from Open-Meteo"
      source: "open_meteo"
      open_meteo_param: "fire_weather_index"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 150.0
      fill_strategy: "forward_fill"
      regional_priority:
        california: "standard"
        texas: "standard"

  vegetation:
    - name: "fuel_model_fbfm40"
      type: "int16"
      description: "Scott & Burgan 40 fuel model code (categorical)"
      source: "landfire"
      enabled: true
      nullable: true
      validation:
        min: 91
        max: 204
      aggregation: "mode"
      regional_priority:
        california: "critical"
        texas: "critical"

    - name: "canopy_cover_pct"
      type: "float32"
      description: "Forest canopy cover percentage"
      source: "landfire"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 100.0
      aggregation: "mean"
      regional_priority:
        california: "critical"   # Sierra Nevada / coastal forest
        texas: "standard"

    - name: "vegetation_type"
      type: "int16"
      description: "LANDFIRE Existing Vegetation Type code (categorical)"
      source: "landfire"
      enabled: true
      nullable: true
      aggregation: "mode"
      regional_priority:
        california: "standard"
        texas: "standard"

    - name: "ndvi"
      type: "float32"
      description: "Normalized Difference Vegetation Index (-1 to 1)"
      source: "modis"
      enabled: true
      nullable: true
      validation:
        min: -1.0
        max: 1.0
      fill_strategy: "forward_fill"
      regional_priority:
        california: "standard"
        texas: "critical"   # Key for TX grass fire detection and fuel curing state

  topography:
    - name: "elevation_m"
      type: "float32"
      description: "Mean elevation within grid cell (meters)"
      source: "srtm"
      enabled: true
      nullable: true
      validation:
        min: -100.0
        max: 4500.0
      aggregation: "mean"
      regional_priority:
        california: "critical"
        texas: "standard"

    - name: "slope_degrees"
      type: "float32"
      description: "Mean terrain slope within grid cell (degrees)"
      source: "srtm"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 90.0
      aggregation: "mean"
      regional_priority:
        california: "critical"   # Must have for CA forest/canyon fires
        texas: "standard"        # Flat terrain; slope less determinative in TX

    - name: "aspect_degrees"
      type: "float32"
      description: "Dominant terrain aspect within grid cell (degrees, 0=N)"
      source: "srtm"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 360.0
      aggregation: "circular_mean"
      regional_priority:
        california: "critical"
        texas: "standard"

  fire_context:
    - name: "active_fire_count"
      type: "int32"
      description: "Number of FIRMS fire detections in cell within time window"
      source: "firms"
      enabled: true
      nullable: false
      default_value: 0
      validation:
        min: 0
      regional_priority:
        california: "critical"
        texas: "critical"

    - name: "mean_frp"
      type: "float32"
      description: "Mean Fire Radiative Power in cell (MW), clipped at 99.5th pctile"
      source: "firms"
      enabled: true
      nullable: true
      default_value: 0.0
      validation:
        min: 0.0
        max: 5000.0
      regional_priority:
        california: "critical"
        texas: "critical"

    - name: "median_frp"
      type: "float32"
      description: "Median Fire Radiative Power in cell (MW) — robust alternative"
      source: "firms"
      enabled: true
      nullable: true
      default_value: 0.0
      validation:
        min: 0.0
        max: 5000.0
      regional_priority:
        california: "standard"
        texas: "standard"

    - name: "max_confidence"
      type: "int8"
      description: "Maximum detection confidence in cell (0-100 for VIIRS)"
      source: "firms"
      enabled: true
      nullable: true
      default_value: 0
      validation:
        min: 0
        max: 100
      regional_priority:
        california: "standard"
        texas: "standard"

    - name: "nearest_fire_distance_km"
      type: "float32"
      description: "Distance from cell centroid to nearest active fire detection (km)"
      source: "firms"
      enabled: true
      nullable: true
      default_value: -1.0
      validation:
        min: -1.0
      regional_priority:
        california: "critical"
        texas: "critical"

    - name: "fire_detected_binary"
      type: "int8"
      description: "Binary label: 1 if any fire detected in cell, 0 otherwise"
      source: "firms"
      enabled: true
      nullable: false
      default_value: 0
      validation:
        allowed_values: [0, 1]
      regional_priority:
        california: "critical"
        texas: "critical"

  derived:
    - name: "days_since_last_precipitation"
      type: "int16"
      description: "Days since last precipitation > 1mm in cell"
      source: "computed"
      enabled: true
      nullable: true
      validation:
        min: 0
        max: 365
      regional_priority:
        california: "standard"
        texas: "critical"   # TX drought-driven fires; critical predictor

    - name: "cumulative_wind_run_24h"
      type: "float32"
      description: "Cumulative wind distance over 24 hours (km)"
      source: "computed"
      enabled: true
      nullable: true
      validation:
        min: 0.0
      regional_priority:
        california: "critical"
        texas: "standard"

    - name: "drought_index_proxy"
      type: "float32"
      description: "Composite drought proxy from soil moisture + temp + precip history"
      source: "computed"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 1.0
      regional_priority:
        california: "standard"
        texas: "critical"

  metadata:
    - name: "data_quality_flag"
      type: "int8"
      # --- Improvement 2b: Expanded regional quality flag ---
      description: >
        0 = all sources fresh (Open-Meteo primary, all present),
        1 = Open-Meteo primary used (normal; included for explicit lineage),
        2 = NWS fallback weather used (Open-Meteo unavailable),
        3 = HRRR rapid weather used (streaming mode, future phase),
        4 = weather interpolated or forward-filled (gap > 1 window),
        5 = partial data (>30% features missing)
      source: "computed"
      enabled: true
      nullable: false
      default_value: 0

    - name: "dominant_fuel_fraction"
      type: "float32"
      description: "Fraction of cell covered by the dominant fuel model"
      source: "computed"
      enabled: true
      nullable: true
      validation:
        min: 0.0
        max: 1.0

anomaly_detection:
  method: "seasonal_baseline"
  seasons:
    fire_season:
      months: [6, 7, 8, 9, 10, 11]
    off_season:
      months: [12, 1, 2, 3, 4, 5]
  z_score_threshold:
    fire_season: 4.0
    off_season: 3.5
  min_baseline_days: 30
  monitored_features:
    - "temperature_2m"
    - "relative_humidity_2m"
    - "wind_speed_10m"
    - "precipitation"
    - "active_fire_count"
    - "mean_frp"
  alerts:
    slack_webhook_env_var: "SLACK_WEBHOOK_URL"
    email_recipients: []
    alert_on_soft_failure: true

validation:
  max_null_rate: 0.15
  row_count_tolerance_pct: 5
  ge_datasource: "wildfire_datasource"

storage:
  gcs_bucket_env_var: "GCS_BUCKET_NAME"
  paths:
    raw: "data/raw"
    processed: "data/processed"
    static: "data/static"
    models: "models"
  # --- Improvement 4c: Region/year/month partitioning ---
  # New: data/processed/22km/region=california/year=2026/month=02/features_2026-02-09.parquet
  # Old: data/processed/64km/date=2026-02-09/features.parquet (still used for 64km cache)
  parquet_partition_columns: ["region", "year", "month"]
  parquet_partition_columns_legacy: ["resolution_km", "date"]

dvc:
  remote_name: "gcs_remote"
  tracked_paths:
    - "data/raw"
    - "data/processed"
    - "data/static"
    - "models"

# =============================================================================
# Adaptive Watchdog & Detection Configuration
# =============================================================================
# Controls the Cloud Function fire watchdog, adaptive scheduling,
# resolution tier escalation, false alarm gates, and emergency thresholds.
# =============================================================================

watchdog:
  # --- Adaptive polling modes ---
  # The Cloud Scheduler job frequency is updated by the Cloud Function itself
  # when transitioning between modes. Intervals in minutes.
  modes:
    quiet:
      description: "Off-season or no recent fire activity"
      poll_interval_minutes: 30
      pipeline_interval_hours: 6
      resolution_km: 64
    active:
      description: "Fire season window, no current confirmed fire"
      poll_interval_minutes: 15
      pipeline_interval_hours: 2
      resolution_km: 64
    emergency:
      description: "Confirmed active fire with expanding footprint"
      poll_interval_minutes: 5
      pipeline_interval_hours: 0.5   # 30-minute full pipeline runs
      resolution_km: 22

  # Fire season months drive quiet → active transition automatically.
  # Mirrors anomaly_detection.seasons.fire_season.months above.
  fire_season_months: [6, 7, 8, 9, 10, 11]

  # --- Detection boundary (H3 ring distance at resolution res 5, ~5.1km edge) ---
  # ring 1 ≈ 5 km,  ring 5 ≈ 25 km
  detection:
    min_range_km: 5
    max_range_km: 25
    h3_ring_min: 1    # ring-1 neighbors (~5 km) — spatial corroboration gate
    h3_ring_max: 5    # ring-5 neighbors (~25 km) — focal grid perimeter

  # --- False alarm prevention gates (applied in sequence) ---
  false_alarm:
    # G1: Spatial corroboration — min neighboring cells with fire in same scan
    min_neighbor_detections: 2
    # G2: Temporal persistence — min consecutive GOES scans with detection
    min_consecutive_scans: 2
    goes_scan_interval_minutes: 10   # GOES CONUS ABI scan cadence
    # G3: Multi-source cross-reference — max hours to look back for VIIRS confirmation
    viirs_lookback_hours: 3
    # G3 bypass — skip VIIRS confirmation if GOES FRP exceeds this (MW)
    # Rationale: a 50 MW fire is ~100 acres actively burning; VIIRS will catch it next pass
    viirs_bypass_frp_mw: 50.0
    # G4: Industrial exclusion — path to GCS config file (updateable without redeployment)
    industrial_sources_gcs_path: "watchdog/config/industrial_sources.json"
    # False alarm cooldown — revert to prior mode after this many minutes
    revert_after_minutes: 30

  # --- Emergency trigger thresholds ---
  emergency:
    # Minimum FRP to consider emergency (MW)
    min_frp_mw: 200.0
    # Minimum number of consecutive scans showing expansion (new cells)
    min_expanding_scans: 2
    # Deactivation: no new cells for this many consecutive scans
    deactivate_no_expansion_scans: 3
    # Deactivation: FRP drops below this for this many scans
    deactivate_frp_mw: 50.0
    deactivate_low_frp_scans: 2

  # --- GCS state paths (all under gs://{GCS_BUCKET_NAME}/) ---
  gcs_paths:
    state: "watchdog/state/current.json"
    triggers: "watchdog/triggers/"
    false_alarms: "watchdog/false_alarms/"
    emergency_log: "watchdog/emergency/"
    industrial_sources: "watchdog/config/industrial_sources.json"

  # --- FIRMS GOES_NRT quick-check config ---
  goes_nrt:
    # Same FIRMS API, different source parameter
    source: "GOES_NRT"
    # Lookback window for client-side filtering (minutes)
    # We always request day_range=1 (API minimum), filter client-side
    client_filter_minutes: 60
    # Minimum FRP (MW) to consider a GOES pixel a candidate detection
    min_frp_mw: 10.0
    # GOES spatial resolution at CONUS (km) — used for ring-distance calculations
    goes_pixel_km: 2.0

  # --- GOES-R S3 direct access (lower latency alternative to FIRMS GOES_NRT) ---
  goes_s3:
    # Buckets for GOES-West and GOES-East (GOES-19 replaced GOES-16 as East in April 2025)
    buckets:
      goes_west: "noaa-goes18"   # GOES-18 covers western CONUS including CA
      goes_east: "noaa-goes19"   # GOES-19 covers eastern CONUS including TX
    product: "ABI-L2-FDCC"
    # Fire-positive mask codes in ABI FDC product
    fire_codes: [10, 11, 30, 31]    # confirmed fire (good quality + saturated)
    probable_codes: [13, 14, 15, 33, 34, 35]  # high/medium/low probability
    use_probable: false             # set true to catch smaller fires (more false alarms)

  # --- Model training sufficiency thresholds (for region manifest) ---
  training_sufficiency:
    california:
      min_fire_event_days: 50
      min_temporal_coverage_days: 90
      min_fire_cells: 30
      min_quality_flag_pct: 0.80   # fraction of rows with flag <= 2
    texas:
      min_fire_event_days: 50
      min_temporal_coverage_days: 90
      min_fire_cells: 30
      min_quality_flag_pct: 0.80
