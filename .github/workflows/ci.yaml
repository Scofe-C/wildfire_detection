# =============================================================================
# Wildfire MLOps Pipeline - CI/CD
# =============================================================================
# Runs on every push and pull request:
#   1. Builds the Docker image (ensures dependency installation works)
#   2. Validates DAG can be imported without errors (inside Docker)
#   3. Runs full pytest suite (inside Docker)
#   4. Checks code style with ruff (inside Docker)
# =============================================================================

name: Pipeline CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'wildfire-pipeline/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'wildfire-pipeline/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build only the 'test' target — no CMD, inherits all deps from airflow-base.
      # Cache layers across runs using GHA cache to keep build under 2 minutes.
      - name: Build CI test image
        uses: docker/build-push-action@v5
        with:
          context: wildfire-pipeline
          file: wildfire-pipeline/docker/Dockerfile
          target: test
          push: false
          load: true
          tags: wildfire-pipeline:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Validates that the DAG file has no import-time errors.
      # This is the cheapest guard against accidental syntax/import regressions.
      - name: Validate DAG imports
        run: |
          docker run --rm \
            -e AIRFLOW__CORE__LOAD_EXAMPLES=false \
            -e AIRFLOW__DATABASE__SQL_ALCHEMY_CONN="sqlite:////tmp/airflow_test.db" \
            -e AIRFLOW__CORE__EXECUTOR=LocalExecutor \
            wildfire-pipeline:test \
            python3 dags/wildfire_dag.py

      # Also validate the watchdog sensor DAG
      - name: Validate watchdog sensor DAG imports
        run: |
          docker run --rm \
            -e AIRFLOW__CORE__LOAD_EXAMPLES=false \
            -e AIRFLOW__DATABASE__SQL_ALCHEMY_CONN="sqlite:////tmp/airflow_test.db" \
            -e AIRFLOW__CORE__EXECUTOR=LocalExecutor \
            wildfire-pipeline:test \
            python3 dags/watchdog_sensor_dag.py

      # Full pytest suite. Tests are designed to run without GCS or API keys.
      # Any test that would require external I/O uses mocks.
      - name: Run pytest suite
        run: |
          docker run --rm \
            -e GCS_BUCKET_NAME=test-bucket \
            -e FIRMS_MAP_KEY=test-key \
            wildfire-pipeline:test \
            pytest tests/ -v --tb=short --no-header \
              --ignore=tests/test_ingestion/test_firms_integration.py

      # Ruff lint — blocks on any error (E/F rules).
      # W and C rules emit warnings only (--exit-zero for those categories
      # is controlled by ruff.toml if present, otherwise default config).
      - name: Lint with ruff
        run: |
          docker run --rm \
            wildfire-pipeline:test \
            ruff check scripts/ dags/ tests/ \
              --output-format=github \
              --select=E,F \
              --ignore=E501

      # Check that constraints.txt and requirements.txt are in sync
      # (no package in requirements.txt is missing from constraints.txt).
      - name: Check dependency consistency
        run: |
          docker run --rm \
            wildfire-pipeline:test \
            python3 -c "
          import re
          req = open('requirements.txt').read()
          con = open('constraints.txt').read()
          req_pkgs = {
              line.split('==')[0].split('>=')[0].split('[')[0].strip().lower()
              for line in req.splitlines()
              if line.strip() and not line.startswith('#')
          }
          con_pkgs = {
              line.split('==')[0].split('>=')[0].strip().lower()
              for line in con.splitlines()
              if line.strip() and not line.startswith('#')
          }
          # pyarrow must always be pinned in constraints
          assert 'pyarrow' in con_pkgs, 'FAIL: pyarrow must be pinned in constraints.txt'
          print('Dependency check passed.')
          "